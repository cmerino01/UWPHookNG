name: build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore UWPHook.sln

      - name: Build
        run: dotnet build UWPHook.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/UWPHook.Tests/UWPHook.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/UWPHook.Tests/TestResults/

      - name: Publish (win-x64, self-contained, single-file)
        run: dotnet publish UWPHook/UWPHook.csproj -c Release -r win-x64 --self-contained true -o publish/win-x64

      - name: Publish (win-arm64, self-contained, single-file)
        run: dotnet publish UWPHook/UWPHook.csproj -c Release -r win-arm64 --self-contained true -o publish/win-arm64

      - name: Upload artifact (win-x64)
        uses: actions/upload-artifact@v4
        with:
          name: UWPHook-win-x64
          path: publish/win-x64/

      - name: Upload artifact (win-arm64)
        uses: actions/upload-artifact@v4
        with:
          name: UWPHook-win-arm64
          path: publish/win-arm64/
